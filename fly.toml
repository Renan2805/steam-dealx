app = 'dealx-api'
primary_region = 'gru'

[build]

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = '10s'
    interval = '30s'
    method = 'GET'
    path = '/health'
    timeout = '5s'

[[mounts]]
  source = 'dealx_cache'
  destination = '/data'

[env]
  Cache__DbPath = '/data/dealscache.db'
