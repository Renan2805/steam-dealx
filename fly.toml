# fly.toml app configuration file generated for steam-dealx on 2026-05-31T17:49:01Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'steam-dealx'
primary_region = 'gru'

[build]

[env]
  Cache__DbPath = '/data/dealscache.db'

[[mounts]]
  source = 'dealx_cache'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
